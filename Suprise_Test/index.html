<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart To-Do Manager</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<h3 class="text-center py-3">SMART TO-DO Manager</h3>

<div class="container bg-light p-3">

  <form id="taskForm" class="row gx-3 gy-2 align-items-center">
    <div class="col-md-4">
      <input type="text" class="form-control" id="taskInput" placeholder="Task Name">
    </div>

    <div class="col-sm-3">
      <select class="form-select" id="priorityInput">
        <option value="">Priority</option>
        <option value="Low">Low</option>
        <option value="Medium">Medium</option>
        <option value="High">High</option>
      </select>
    </div>

    <div class="col-md-3">
      <input type="date" id="deadlineInput" class="form-control">
    </div>

    <div class="col-auto d-grid">
      <button type="submit" class="btn btn-primary">Add Task</button>
    </div>
  </form>

  <div class="row p-3">
    <div class="col-md-7">
      <div class="btn-group">
        <button class="btn btn-outline-secondary filter-btn" data-filter="all">All</button>
        <button class="btn btn-outline-success filter-btn" data-filter="completed">Completed</button>
        <button class="btn btn-outline-warning filter-btn" data-filter="pending">Pending</button>
      </div>
    </div>

    <div class="col-md-3">
      <select id="sortOption" class="form-select">
        <option value="">Sort By</option>
        <option value="priority">Priority (High → Low)</option>
        <option value="deadline">Deadline (Nearest first)</option>
      </select>
    </div>
  </div>

  <div class="mb-3">
    Total: <strong id="totalCount">0</strong> |
    Completed: <strong id="completedCount">0</strong> |
    Pending: <strong id="pendingCount">0</strong>
  </div>

  <div id="taskList"></div>

</div>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
